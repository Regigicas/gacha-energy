<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gacha Stamina Calculator</title>
  <meta name="description" content="Track stamina replenishment across multiple gacha games at once." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f1a;
      --surface: #161929;
      --surface2: #1e2338;
      --border: rgba(130, 150, 255, 0.15);
      --accent: #7c8dff;
      --accent2: #a78bfa;
      --accent3: #38bdf8;
      --text: #e2e6ff;
      --muted: #8892b0;
      --success: #34d399;
      --danger: #f87171;
      --glow: rgba(124, 141, 255, 0.25);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(124, 141, 255, 0.1), transparent),
        radial-gradient(ellipse 50% 40% at 90% 90%, rgba(167, 139, 250, 0.07), transparent);
    }

    /* ── Page header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .page-title {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }

    .page-title .icon {
      font-size: 1.6rem;
      filter: drop-shadow(0 0 12px var(--accent));
    }

    .page-title h1 {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.35rem 0.75rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(124, 141, 255, 0.3);
    }

    .add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(124, 141, 255, 0.4);
    }

    .add-btn:active {
      transform: translateY(0);
    }

    /* ── Horizontal scroll area ── */
    .games-track-wrap {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 2rem;
      /* Custom scrollbar */
      scrollbar-width: thin;
      scrollbar-color: var(--accent) var(--surface2);
    }

    .games-track-wrap::-webkit-scrollbar {
      height: 6px;
    }

    .games-track-wrap::-webkit-scrollbar-track {
      background: var(--surface2);
      border-radius: 100px;
    }

    .games-track-wrap::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 100px;
    }

    .games-track {
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
      min-height: 520px;
    }

    /* ── Individual game card ── */
    .game-card {
      flex-shrink: 0;
      width: 300px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    /* Card top row: game name + remove */
    .card-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .game-name-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      padding: 0.2rem 0;
      outline: none;
      transition: border-color 0.2s;
    }

    .game-name-input:focus {
      border-bottom-color: var(--accent);
    }

    .game-name-input::placeholder {
      color: var(--muted);
      font-weight: 400;
    }

    .remove-btn {
      background: none;
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: 8px;
      color: var(--danger);
      font-size: 0.8rem;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .remove-btn:hover {
      background: rgba(248, 113, 113, 0.1);
      border-color: var(--danger);
    }

    /* Field */
    .field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.4rem;
    }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 0.85rem;
      color: var(--text);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .field input::placeholder {
      color: var(--muted);
    }

    /* Stamina bar */
    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.4rem;
    }

    .bar-track {
      background: var(--surface2);
      border-radius: 100px;
      height: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .bar-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 6px var(--glow);
      width: 0%;
    }

    /* Calculate button */
    .calc-btn {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(124, 141, 255, 0.3);
    }

    .calc-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(124, 141, 255, 0.4);
    }

    .calc-btn:active {
      transform: translateY(0);
    }

    /* Result */
    .result {
      display: none;
      animation: fadeUp 0.25s ease;
    }

    .result.visible {
      display: block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .result-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 0.75rem;
      text-align: center;
    }

    .rc-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .rc-value {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent3), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .rc-sub {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .full-message {
      background: linear-gradient(135deg, rgba(52, 211, 153, 0.12), rgba(52, 211, 153, 0.04));
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 12px;
      padding: 0.85rem;
      text-align: center;
      color: var(--success);
      font-weight: 600;
      font-size: 0.88rem;
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.78rem;
      margin-top: 0.3rem;
      display: none;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      min-width: 260px;
      min-height: 300px;
      border: 1.5px dashed var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .empty-state:hover {
      border-color: var(--accent);
      background: rgba(124, 141, 255, 0.04);
    }

    .empty-state .es-icon {
      font-size: 2.5rem;
      opacity: 0.5;
    }

    /* Footer */
    .page-footer {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
    }

    .page-footer a {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.2s;
    }

    .page-footer a:hover {
      color: var(--text);
    }

    .page-footer svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }
  </style>
</head>

<body>

  <header class="page-header">
    <div class="page-title">
      <span class="icon">⚡</span>
      <h1>Gacha Stamina Calculator</h1>
    </div>
  </header>

  <div class="games-track-wrap">
    <div class="games-track" id="gamesTrack">
      <!-- Cards injected here -->
    </div>
  </div>

  <footer class="page-footer">
    <a href="https://github.com/Regigicas/gacha-energy" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path
          d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
      </svg>
    </a>
  </footer>

  <script>
    let gameCounter = 0;

    const PRESETS = [
      { name: 'Genshin Impact', max: 200, regen: 8 },
      { name: 'Honkai: Star Rail', max: 240, regen: 6 },
      { name: 'Zenless Zone Zero', max: 240, regen: 6 },
    ];

    function addGame(preset = null) {
      const id = ++gameCounter;
      const p = preset || { name: '', max: 240, regen: 6 };

      const card = document.createElement('div');
      card.classList.add('game-card');
      card.id = `card-${id}`;
      card.innerHTML = `
        <div class="card-header">
          <input class="game-name-input" type="text"
            placeholder="Game name…"
            value="${p.name}"
            id="name-${id}"
            oninput="saveGameList()" />
          <button class="remove-btn" onclick="removeGame(${id})" title="Remove">✕</button>
        </div>

        <div class="field">
          <label for="cur-${id}">Current Stamina</label>
          <input type="number" id="cur-${id}" min="0" value="${p.cur ?? 0}"
            onblur="if(this.value==='')this.value='0'"
            oninput="saveGameList()"
            onkeydown="if(event.key==='Enter')calculate(${id})" />
          <div class="error-msg" id="err-${id}"></div>
        </div>

        <div class="field">
          <label for="max-${id}">Max Stamina</label>
          <input type="number" id="max-${id}" min="1" value="${p.max}"
            onkeydown="if(event.key==='Enter')calculate(${id})" />
        </div>

        <div class="field">
          <label for="regen-${id}">Regen (min / 1 stamina)</label>
          <input type="number" id="regen-${id}" min="0.1" step="0.1" value="${p.regen}"
            onkeydown="if(event.key==='Enter')calculate(${id})" />
        </div>

        <div id="barWrap-${id}" style="display:none">
          <div class="bar-label">
            <span>Stamina</span>
            <span id="barPct-${id}">0%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" id="barFill-${id}"></div>
          </div>
        </div>

        <button class="calc-btn" onclick="calculate(${id})">Calculate ⚡</button>

        <div class="result" id="result-${id}">
          <div class="full-message" id="fullMsg-${id}" style="display:none">✅ Stamina is already full!</div>
          <div class="result-grid" id="grid-${id}">
            <div class="result-card">
              <div class="rc-label">Time Remaining</div>
              <div class="rc-value" id="timeRem-${id}">—</div>
              <div class="rc-sub"  id="timeRemSub-${id}"></div>
            </div>
            <div class="result-card">
              <div class="rc-label">Full At</div>
              <div class="rc-value" id="fullAt-${id}">—</div>
              <div class="rc-sub"  id="fullAtSub-${id}"></div>
            </div>
          </div>
        </div>
      `;

      const track = document.getElementById('gamesTrack');
      updateEmptyState(track, false);         // hide empty state if showing
      track.appendChild(card);
      saveGameList();

      // Scroll new card into view
      requestAnimationFrame(() => card.scrollIntoView({ behavior: 'smooth', inline: 'end', block: 'nearest' }));
    }

    function removeGame(id) {
      const card = document.getElementById(`card-${id}`);
      if (card) {
        card.style.transition = 'opacity 0.2s, transform 0.2s';
        card.style.opacity = '0';
        card.style.transform = 'scale(0.95)';
        setTimeout(() => {
          card.remove();
          saveGameList();
          const track = document.getElementById('gamesTrack');
          if (track.querySelectorAll('.game-card').length === 0) updateEmptyState(track, true);
        }, 200);
      }
    }

    function saveGameList() {
      const cards = [...document.querySelectorAll('.game-card')];
      const list = cards.map(card => {
        const id = card.id.replace('card-', '');
        return {
          name: document.getElementById(`name-${id}`).value,
          cur: parseFloat(document.getElementById(`cur-${id}`).value) || 0,
          max: parseFloat(document.getElementById(`max-${id}`).value) || 240,
          regen: parseFloat(document.getElementById(`regen-${id}`).value) || 6,
        };
      });
      localStorage.setItem('gachaGameList', JSON.stringify(list));
    }

    function showError(id, msg) {
      const el = document.getElementById(`err-${id}`);
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    function calculate(id) {
      const cur = parseFloat(document.getElementById(`cur-${id}`).value);
      const max = parseFloat(document.getElementById(`max-${id}`).value);
      const regen = parseFloat(document.getElementById(`regen-${id}`).value);

      showError(id, '');

      if (isNaN(cur)) { showError(id, 'Enter current stamina.'); return; }
      if (isNaN(max) || max <= 0) { showError(id, 'Max stamina must be > 0.'); return; }
      if (isNaN(regen) || regen <= 0) { showError(id, 'Regen interval must be > 0.'); return; }
      if (cur < 0) { showError(id, 'Cannot be negative.'); return; }
      if (cur > max) { showError(id, 'Exceeds max stamina.'); return; }

      const missing = max - cur;
      const totalMinutes = missing * regen;

      // Stamina bar
      const pct = Math.round((cur / max) * 100);
      document.getElementById(`barWrap-${id}`).style.display = 'block';
      document.getElementById(`barFill-${id}`).style.width = pct + '%';
      document.getElementById(`barPct-${id}`).textContent = pct + '%';

      const result = document.getElementById(`result-${id}`);
      const fullMsg = document.getElementById(`fullMsg-${id}`);
      const grid = document.getElementById(`grid-${id}`);

      result.classList.add('visible');

      if (missing === 0) {
        fullMsg.style.display = 'block';
        grid.style.display = 'none';
        return;
      }

      fullMsg.style.display = 'none';
      grid.style.display = 'grid';

      const hours = Math.floor(totalMinutes / 60);
      const mins = Math.round(totalMinutes % 60);

      let timeStr = '';
      if (hours > 0 && mins > 0) timeStr = `${hours}h ${mins}m`;
      else if (hours > 0) timeStr = `${hours}h`;
      else timeStr = `${mins}m`;

      const now = new Date();
      const fullAt = new Date(now.getTime() + totalMinutes * 60000);
      const fullAtTime = fullAt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const today = new Date(); today.setHours(0, 0, 0, 0);
      const fullDay = new Date(fullAt); fullDay.setHours(0, 0, 0, 0);
      const dayDiff = Math.round((fullDay - today) / 86400000);
      const dateSub = dayDiff === 0 ? 'Today'
        : dayDiff === 1 ? 'Tomorrow'
          : fullAt.toLocaleDateString([], { weekday: 'long' });

      document.getElementById(`timeRem-${id}`).textContent = timeStr;
      document.getElementById(`timeRemSub-${id}`).textContent = `${missing} stamina to restore`;
      document.getElementById(`fullAt-${id}`).textContent = fullAtTime;
      document.getElementById(`fullAtSub-${id}`).textContent = dateSub;
    }

    // ── Empty state placeholder ──
    function buildEmptyState() {
      const div = document.createElement('div');
      div.classList.add('empty-state');
      div.id = 'emptyState';
      div.onclick = () => addGame();
      div.innerHTML = `
        <span class="es-icon">🎮</span>
        <span>No games yet.<br/>Click <strong>Add Game</strong> to get started.</span>
      `;
      return div;
    }

    function updateEmptyState(track, show) {
      const existing = document.getElementById('emptyState');
      if (show && !existing) track.appendChild(buildEmptyState());
      if (!show && existing) existing.remove();
    }

    // ── Preset quick-add dropdown ──
    // Seed with the three popular presets on load
    window.addEventListener('DOMContentLoaded', () => {
      const track = document.getElementById('gamesTrack');

      // Restore saved game list
      const saved = JSON.parse(localStorage.getItem('gachaGameList') || 'null');
      if (saved && saved.length > 0) {
        saved.forEach(g => addGame(g));
      } else {
        updateEmptyState(track, true);
      }

      // Add preset buttons under the Add button
      const header = document.querySelector('.page-header');
      const presetsWrap = document.createElement('div');
      presetsWrap.style.cssText = 'display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;justify-content:flex-end;';

      // Add Game button first
      const addBtn = document.createElement('button');
      addBtn.id = 'addGameBtn';
      addBtn.className = 'add-btn';
      addBtn.innerHTML = '<span>＋</span> Add Game';
      addBtn.onclick = () => addGame();
      presetsWrap.appendChild(addBtn);

      PRESETS.forEach(p => {
        const btn = document.createElement('button');
        btn.textContent = '＋ ' + p.name;
        btn.style.cssText = `
          background: var(--surface2);
          border: 1px solid var(--border);
          border-radius: 8px;
          color: var(--text);
          font-size: 0.75rem;
          font-family: 'Inter', sans-serif;
          padding: 0.35rem 0.75rem;
          cursor: pointer;
          transition: border-color 0.15s, background 0.15s;
          white-space: nowrap;
        `;
        btn.onmouseenter = () => { btn.style.borderColor = 'var(--accent)'; btn.style.background = 'var(--surface)'; };
        btn.onmouseleave = () => { btn.style.borderColor = 'var(--border)'; btn.style.background = 'var(--surface2)'; };
        btn.onclick = () => addGame(p);
        presetsWrap.appendChild(btn);
      });

      header.appendChild(presetsWrap);
    });
  </script>
</body>

</html>
